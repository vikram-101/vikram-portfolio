<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#050505" />
    <title>Resume | Vikram AI/ML Portfolio</title>
    <link rel="icon" type="image/svg+xml" href="/vikram-mark.svg" />
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Arial, sans-serif;
        background:
          radial-gradient(circle at top left, rgba(143, 179, 255, 0.12), transparent 24%),
          linear-gradient(180deg, #030303 0%, #0a0b10 100%);
        color: #f6f7fb;
      }

      .resume-shell {
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
      }

      .resume-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 1rem;
        padding: 1rem 1.25rem;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(8, 8, 10, 0.84);
        backdrop-filter: blur(12px);
      }

      .resume-brand {
        display: flex;
        align-items: center;
        gap: 0.8rem;
      }

      .resume-brand img {
        width: 2.4rem;
        height: 2.4rem;
        border-radius: 0.8rem;
      }

      .resume-brand strong {
        display: block;
        font-size: 1rem;
      }

      .resume-brand span {
        display: block;
        margin-top: 0.15rem;
        color: #b6b8c6;
        font-size: 0.82rem;
      }

      .resume-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
      }

      .resume-actions a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 2.8rem;
        padding: 0.8rem 1.15rem;
        border-radius: 999px;
        text-decoration: none;
        font-weight: 700;
      }

      .resume-actions a:first-child {
        background: linear-gradient(135deg, #ffffff, #d7e3ff 60%, #8ea0c5);
        color: #050505;
      }

      .resume-actions a:last-child {
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.04);
        color: #f6f7fb;
      }

      .resume-viewer {
        padding: 1rem;
      }

      .resume-frame {
        width: 100%;
        height: calc(100vh - 6rem);
        border: 0;
        border-radius: 1.2rem;
        background: #111318;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
      }

      @media (max-width: 720px) {
        .resume-bar {
          flex-direction: column;
          align-items: stretch;
        }

        .resume-actions a {
          width: 100%;
        }

        .resume-frame {
          height: calc(100vh - 12rem);
        }
      }
    </style>
  </head>
  <body>
    <div class="resume-shell">
      <div class="resume-bar">
        <div class="resume-brand">
          <img src="/vikram-mark.svg" alt="Vikram logo" />
          <div>
            <strong>Vikram Thakur Resume</strong>
            <span>AI / ML Engineer Portfolio</span>
          </div>
        </div>

        <div class="resume-actions">
          <a href="/Vikram_Thakur_Resume.pdf" download>Download Resume</a>
          <a href="/">Back to Portfolio</a>
        </div>
      </div>

      <div class="resume-viewer">
        <iframe class="resume-frame" src="/Vikram_Thakur_Resume.pdf" title="Vikram Thakur Resume"></iframe>
      </div>
    </div>
  </body>
</html>
